services:
  redis-go-ticket:
    container_name: redis-go-ticket
    image: redis:7-alpine
    ports:
      - "6379:6379"
  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=local:redis-go-ticket:6379
    ports:
      - "8081:8081"
    user: redis